<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>味道餐厅 - 点菜系统</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div class="logo">🍽️</div>
  <h1>味道餐厅</h1>
  <p class="subtitle">完整餐厅点菜信息系统 · 两端数据实时同步</p>
  
  <div class="cards">
    <a class="card mobile" href="app.html">
      <span class="card-icon">📱</span>
      <h2>顾客点餐</h2>
      <p>扫码选桌、浏览菜单、购物车下单、查看订单状态</p>
      <span class="tag">移动端 App</span>
    </a>
    <a class="card admin" href="admin.html">
      <span class="card-icon">🖥️</span>
      <h2>管理后台</h2>
      <p>订单管理、菜品/分类/桌台管理、营业报表、评价管理</p>
      <span class="tag">PC端 Web</span>
    </a>
  </div>
  
  <div class="footer">
    <p>两个界面共享同一 localStorage 数据，打开均可实时同步</p>
    <p>建议：移动端用手机/窄窗口打开 app.html，PC端用宽屏打开 admin.html</p>
  </div>
</body>
</html>
